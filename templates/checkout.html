<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkout | MoleTom</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <main class="page-shell">
      <section class="panel">
        <p class="eyebrow">Passo 3</p>
        <h1>Checkout do design</h1>
        <p class="hero-copy">
          Seu moletom {{ design.color }} foi preparado com sucesso. O próximo
          passo é integrar pagamento.
        </p>
        <div class="button-row">
          <a
            class="btn btn-primary"
            href="{{ url_for('preview', design_id=design.id) }}"
            >Voltar ao preview</a
          >
          <a class="btn btn-secondary" href="{{ url_for('generator') }}"
            >Gerar novo design</a
          >
        </div>
      </section>
    </main>
  </body>
</html>
